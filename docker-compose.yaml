services:
  grafana:
    image: grafana/grafana:12.4.0
    ports:
      - target: 3000
        published: "${GRAFANA_PORT:-0}"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - ./dist:/var/lib/grafana/plugins/yuuki-slurm-app
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yuuki-slurm-app
    depends_on:
      mysql:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./dev/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./dev/prometheus-data:/prometheus/data
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus/data'
      - '--storage.tsdb.retention.time=30d'

  mysql:
    image: mariadb:11
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: slurm
      MARIADB_DATABASE: slurm_acct_db
      MARIADB_USER: slurm
      MARIADB_PASSWORD: slurm
    volumes:
      - ./dev/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-exporter:
    build:
      context: ./dev
      dockerfile: Dockerfile.mock-exporter
    ports:
      - "127.0.0.1:9999:9999"
