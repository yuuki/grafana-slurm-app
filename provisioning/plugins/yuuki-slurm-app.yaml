apiVersion: 1

apps:
  - type: yuuki-slurm-app
    org_id: 1
    disabled: false
    jsonData:
      dbHost: "mysql:3306"
      dbName: "slurm_acct_db"
      dbUser: "slurm"
      clusterName: "gpu_cluster"
      promDatasourceUid: "prometheus"
      nodeExporterPort: "9100"
      dcgmExporterPort: "9400"
      instanceLabel: "instance"
      metricsifterServiceUrl: "http://metricsifter:8000"
      metricsifterDefaultParams:
        searchMethod: "pelt"
        costModel: "l2"
        penalty: "bic"
        penaltyAdjust: 2
        bandwidth: 2.5
        segmentSelectionMethod: "weighted_max"
        nJobs: 1
        withoutSimpleFilter: false
    secureJsonData:
      dbPassword: "slurm"
