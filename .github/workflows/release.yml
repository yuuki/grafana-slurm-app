name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build -o dist/gpx_slurm_app_linux_amd64 ./pkg

      - name: Build backend (linux/arm64)
        run: GOOS=linux GOARCH=arm64 go build -o dist/gpx_slurm_app_linux_arm64 ./pkg

      - name: Package plugin
        run: |
          PLUGIN_ID="yuuki-slurm-app"
          TAG="${GITHUB_REF#refs/tags/v}"
          ARCHIVE="${PLUGIN_ID}-${TAG}.zip"

          mv dist "${PLUGIN_ID}"
          zip -r "${ARCHIVE}" "${PLUGIN_ID}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --generate-notes \
            "${ARCHIVE}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
