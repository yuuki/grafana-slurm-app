name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Build backend
        run: go build -o dist/gpx_slurm_app_linux_amd64 ./pkg

      - name: Prepare Prometheus data directory
        run: |
          rm -rf dev/prometheus-data
          mkdir -p dev/prometheus-data
          chmod 0777 dev/prometheus-data

      - name: Start services
        run: docker compose -f docker-compose.yaml -f docker-compose.e2e.yaml up -d --wait

      - name: Discover Grafana URL
        run: |
          GRAFANA_PORT="$(docker compose -f docker-compose.yaml -f docker-compose.e2e.yaml port grafana 3000 | sed -E 's/.*:([0-9]+)$/\1/')"
          echo "GRAFANA_PORT=${GRAFANA_PORT}" >> "$GITHUB_ENV"
          echo "GRAFANA_URL=http://127.0.0.1:${GRAFANA_PORT}" >> "$GITHUB_ENV"

      - name: Wait for Grafana
        run: |
          until curl -sf "${GRAFANA_URL}/api/health" > /dev/null 2>&1; do
            sleep 2
          done

      - name: Run E2E tests
        run: npx playwright test

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yaml -f docker-compose.e2e.yaml down -v

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
